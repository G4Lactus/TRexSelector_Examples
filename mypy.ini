# mypy configuration for this repository.
#
# Scope: the suite-level plotting modules under cpp/ (trex_plt_utils.py and
# trex_da_plt_utils.py). Type-checking dependencies live in
# requirements-dev.txt -- notably pandas-stubs, since pandas ships no py.typed
# marker and is otherwise invisible to the checker.
#
# Run from the repository root:
#   mypy cpp/trex_selector_methods/trex/trex_plt_utils.py \
#        cpp/trex_selector_methods/trex_da/trex_da_plt_utils.py

[mypy]
# Keep the default (permissive) strictness: these are plotting scripts, not a
# typed library. The point of checking them is to catch real mistakes, not to
# annotate every local.
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True

# plotly ships no py.typed marker, and the only stub package (plotly-stubs) is
# still 0.1.x -- too immature to pin a figure suite to. Its imports are optional
# dependencies guarded by try/except ImportError, and nothing we annotate
# depends on their types, so leave them unanalysed rather than half-typed.
[mypy-plotly]
ignore_missing_imports = True

[mypy-plotly.*]
ignore_missing_imports = True
